version: 2

models:
  - name: mart_customer_360
    description: Customer 360
    columns:
      - name: customer_unique_id
        description: Primary key, id of the customer
        tests:
          - not_null
          - unique
      - name: customer_city
        description: City of customer
      - name: customer_state
        description: State of customer
      - name: total_order
        description: The total order of that customer
      - name: total_product
        description: The total unique product that customer bought
      - name: total_amount
        description: The total amount, include shipping value that customer has to pay
      - name: total_net_amount
        description: The total value of products that customer has purchased
      - name: last_purchase_date
        description: The last day that customer made a purchase

  - name: mart_order_summary
    description: >
      Order-level summary table aggregating key metrics per order.
    columns:
      - name: order_id
        description: Unique identifier of the order (primary key)
        tests:
          - not_null
          - unique
      - name: total_item
        description: Total number of unique products in the order
        tests:
          - not_null
      - name: total_product_value
        description: Total value of products in the order
        tests:
          - not_null
      - name: total_freight_value
        description: Total shipping cost associated with the order
        tests:
          - not_null
      - name: total_amount
        description: Total order value, including product, shipping, and after discounts
        tests:
          - not_null
      - name: total_voucher_discount
        description: Total voucher or discount applied to the order
      - name: total_payment
        description: Total amount actually paid by the customer
        tests:
          - not_null

  - name: mart_products_performance
    description: >
      Product-level performance table that aggregates sales, customer behavior, 
      pricing, shipping cost, and cancellation metrics for each product.
    columns:
      - name: product_id
        description: Unique identifier of the product (primary key)
        tests:
          - not_null
          - unique
      - name: product_category_name
        description: Category name of the product
      - name: total_customer
        description: Total number of distinct customers who purchased the product
        tests:
          - not_null
      - name: total_order
        description: Total number of orders containing the product
        tests:
          - not_null
      - name: total_quantity
        description: Total quantity of the product sold
        tests:
          - not_null
      - name: total_amount
        description: Total revenue generated from the product
        tests:
          - not_null
      - name: avg_price
        description: Average selling price per unit of the product
      - name: max_price
        description: Maximum selling price of the product
      - name: min_price
        description: Minimum selling price of the product
      - name: total_freight_value
        description: Total shipping cost associated with the product
      - name: avt_freight_value
        description: Average shipping cost per unit of the product
      - name: avg_shipping_date
        description: Average number of days from purchase to delivery
      - name: cancel_rate
        description: Ratio of canceled orders to total orders for the product
      - name: lastest_order_day
        description: Most recent order date for the product

  - name: mart_seller_performance
    description: >
      Seller-level performance table aggregating metrics per seller.
    columns:
      - name: seller_id
        description: Unique identifier of each seller (primary key)
        tests:
          - not_null
          - unique
      - name: total_customer
        description: Total number of distinct customers who purchased from the seller
        tests:
          - not_null
      - name: total_order
        description: Total number of orders handled by the seller
        tests:
          - not_null
      - name: total_product
        description: Total number of distinct products sold by the seller
        tests:
          - not_null
      - name: total_product_quantity
        description: Total quantity of products sold by the seller
        tests:
          - not_null
      - name: total_order_amount
        description: Total revenue generated by the seller
        tests:
          - not_null
      - name: max_order_amount
        description: Maximum total value among orders handled by the seller
      - name: min_order_amount
        description: Minimum total value among orders handled by the seller
      - name: avg_product_price
        description: Average price per product sold by the seller
      - name: max_product_price
        description: Maximum price among products sold by the seller
      - name: min_product_price
        description: Minimum price among products sold by the seller
      - name: total_freight_value
        description: Total shipping cost associated with the seller's orders
      - name: avg_freight_value
        description: Average shipping cost per product sold by the seller
      - name: cancel_rate
        description: Ratio of canceled orders to total orders for the seller
      - name: latest_order_day
        description: Most recent order date handled by the seller